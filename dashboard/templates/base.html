<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IDS Dashboard{% endblock %}</title>
    <meta name="description" content="Real-time Intrusion Detection System monitoring dashboard">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        /* ── RESET & BASE ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary:    #0a0e17;
            --bg-secondary:  #111827;
            --bg-card:       #1a2234;
            --bg-card-hover: #1f2a40;
            --border:        #2a3550;
            --text-primary:  #e2e8f0;
            --text-secondary:#94a3b8;
            --text-muted:    #64748b;
            --accent-cyan:   #06d6a0;
            --accent-blue:   #38bdf8;
            --accent-purple: #a78bfa;
            --severity-high: #ef4444;
            --severity-med:  #f59e0b;
            --severity-low:  #22c55e;
            --glow-cyan:     0 0 20px rgba(6, 214, 160, 0.15);
            --glow-red:      0 0 20px rgba(239, 68, 68, 0.15);
            --radius:        12px;
            --radius-sm:     8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── ANIMATED BACKGROUND ───────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(6, 214, 160, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(56, 189, 248, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(167, 139, 250, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── NAVBAR ────────────────────────────────────────────── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 64px;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .navbar-brand .shield {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
        }
        .nav-links a {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-cyan);
            background: rgba(6, 214, 160, 0.08);
        }
        .nav-links a.active {
            box-shadow: inset 0 -2px 0 var(--accent-cyan);
        }
        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--severity-high);
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--severity-high);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* ── LAYOUT ────────────────────────────────────────────── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* ── CARDS ─────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
        }
        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .card-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
        }

        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }

        /* ── SEVERITY COLORS ───────────────────────────────────── */
        .severity-high { color: var(--severity-high); }
        .severity-medium { color: var(--severity-med); }
        .severity-low { color: var(--severity-low); }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
        }
        .badge-high   { background: rgba(239, 68, 68, 0.15); color: var(--severity-high); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-medium { background: rgba(245, 158, 11, 0.15); color: var(--severity-med); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-low    { background: rgba(34, 197, 94, 0.15); color: var(--severity-low); border: 1px solid rgba(34, 197, 94, 0.3); }

        /* ── TABLE ─────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead {
            background: rgba(6, 214, 160, 0.06);
        }
        th {
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(42, 53, 80, 0.5);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        tr:hover td {
            background: rgba(6, 214, 160, 0.03);
        }
        tr.row-high   { border-left: 3px solid var(--severity-high); }
        tr.row-medium { border-left: 3px solid var(--severity-med); }
        tr.row-low    { border-left: 3px solid var(--severity-low); }

        /* ── FORMS / FILTERS ───────────────────────────────────── */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
            padding: 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .filter-bar input,
        .filter-bar select {
            padding: 8px 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: var(--accent-cyan);
        }
        .filter-bar input { flex: 1; min-width: 200px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #0a0e17;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        /* ── PAGINATION ────────────────────────────────────────── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 1.5rem;
        }
        .pagination a, .pagination span {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .pagination a:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        .pagination .active {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
            font-weight: 700;
        }
        .pagination .disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* ── CHART CONTAINER ───────────────────────────────────── */
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }
        .chart-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* ── ATTACK TYPE PILLS ─────────────────────────────────── */
        .attack-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .attack-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }
        .attack-pill .count {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        /* ── SCROLLBAR ─────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── RESPONSIVE ────────────────────────────────────────── */
        @media (max-width: 768px) {
            .navbar { padding: 0 1rem; }
            .container { padding: 1rem; }
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            .nav-links { gap: 0; }
            .nav-links a { padding: 8px 10px; font-size: 0.8rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="shield">🛡</span>
            IDS Monitor
        </a>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">⬡ Dashboard</a></li>
            <li><a href="/alerts" class="{% if request.path == '/alerts' %}active{% endif %}">⚠ Alerts</a></li>
            <li><a href="/stats" class="{% if request.path == '/stats' %}active{% endif %}">◈ Statistics</a></li>
        </ul>
        <div class="live-badge">
            <span class="live-dot"></span>
            LIVE
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
